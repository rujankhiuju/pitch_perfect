kind = "web"
previewPath = "/"
title = "Guitar Tuner"
version = "1.0.0"
id = "artifacts/guitar-tuner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26220

[services.development]
run = "pnpm --filter @workspace/guitar-tuner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/guitar-tuner", "run", "build" ]
publicDir = "artifacts/guitar-tuner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26220"
BASE_PATH = "/"
